name: prsk dependabot

on:
  pull_request:
    types: [opened]

permissions:
  pull-requests: write

jobs:
  prsk-notification-dependabot:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Rename dependabot PR title with prsk
        uses: narumikr/link-sekai-actions/prsk-dependabot@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}